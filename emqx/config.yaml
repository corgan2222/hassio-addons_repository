name: EMQX
version: 0.8.3
slug: emqx
description: The most scalable open-source MQTT broker for IoT. Enterprise Version.
url: https://github.com/corgan2222/addon-emqx
startup: services
ingress: true
ingress_port: 18083
ingress_stream: true
init: false
panel_icon: mdi:pipe
panel_title: EMQX
arch:
- aarch64
- amd64
map:
- ssl
- addon_config:rw
options:
  env_vars: []
host_network: true
schema:
  env_vars:
  - name: match(^EMQX_([A-Z0-9_])+$)
    value: str
image: ghcr.io/corgan2222/emqx/{arch}
