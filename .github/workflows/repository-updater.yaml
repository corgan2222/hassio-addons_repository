---
name: Repository Updater

# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types: ["update"]

permissions:
  contents: read

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/repository-updater.yaml@3846ae0fd09acec8ac1ac308ceacd052b9d01bec # v2.0.6
    secrets:
      UPDATER_TOKEN: ${{ secrets.UPDATER_TOKEN }}

  changelog:
    name: Update changelog
    needs: workflows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.UPDATER_TOKEN }}
          ref: master

      - name: Pull latest (updater may have pushed a commit)
        run: git pull --rebase

      - name: Prepend changelog entry
        env:
          GH_TOKEN: ${{ secrets.UPDATER_TOKEN }}
          VERSION: ${{ github.event.client_payload.version }}
          REPOSITORY: ${{ github.event.client_payload.repository }}
          ADDON: ${{ github.event.client_payload.app }}
        run: |
          # Skip if VERSION is a git SHA (edge builds) rather than a release tag
          if [[ ! "${VERSION}" =~ ^v[0-9] ]]; then
            echo "Version '${VERSION}' is not a release tag, skipping changelog."
            exit 0
          fi

          CHANGELOG="${ADDON}/CHANGELOG.md"
          DATE=$(date +%Y-%m-%d)

          # Fetch release notes from the addon repo
          NOTES=$(gh api "repos/${REPOSITORY}/releases/tags/${VERSION}" --jq '.body // ""')

          # Build new entry
          ENTRY="## ${VERSION} (${DATE})\n\n${NOTES}\n\n"

          # Prepend entry to existing changelog
          TMP=$(mktemp)
          printf "%s\n\n%s" "$(printf "$ENTRY")" "$(cat "$CHANGELOG")" > "$TMP"
          mv "$TMP" "$CHANGELOG"

      - name: Commit changelog
        env:
          VERSION: ${{ github.event.client_payload.version }}
          ADDON: ${{ github.event.client_payload.app }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${ADDON}/CHANGELOG.md"
          git diff --staged --quiet || git commit -m ":books: Update changelog for ${VERSION}"
          git push

  announce:
    name: Announce app update
    needs: workflows
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Announce on Discord server
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          username: ${{ github.event.client_payload.name }}
          avatar_url: |
            https://raw.githubusercontent.com/${{ github.repository }}/master/${{ github.event.client_payload.app }}/icon.png
          title: ":arrow_up: ${{ github.event.client_payload.name }} ${{ github.event.client_payload.version }}"
          image: |
            https://raw.githubusercontent.com/${{ github.repository }}/master/${{ github.event.client_payload.app }}/logo.png
          description: |
            A new version of the ${{ github.event.client_payload.name }} app has been published.

            **Version**: `${{ github.event.client_payload.version }}`
            **Release notes**:
            <https://github.com/${{ github.event.client_payload.repository }}/releases/tag/${{ github.event.client_payload.version }}>
