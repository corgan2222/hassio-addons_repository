name: EMQX6 Enterprise
version: 1.0.0
slug: emqx6
description: "EMQX Enterprise v6 \u2014 the most scalable open-source MQTT broker\
  \ for IoT. An alternative for the Mosquitto add-on."
url: https://github.com/corgan2222/addon-emqx6
startup: services
ingress: true
ingress_port: 18083
ingress_stream: true
init: false
panel_icon: mdi:pipe
panel_title: EMQX6
arch:
- aarch64
- amd64
map:
- ssl
- addon_config:rw
options:
  env_vars: []
host_network: true
schema:
  env_vars:
  - name: match(^EMQX_([A-Z0-9_])+$)
    value: str
image: ghcr.io/corgan2222/emqx6/{arch}
